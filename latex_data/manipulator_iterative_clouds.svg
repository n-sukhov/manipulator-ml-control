<svg width="960" height="720" viewBox="0 0 960 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Manipulator with candidate point clouds around joints</title>
  <desc id="desc">A four-link manipulator with point clouds around every joint, target points for the last joints, dashed distance lines, and selected candidate points labeled rc.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>

    <pattern id="minor-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 H 0 V 20" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>

    <pattern id="major-grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#minor-grid)"/>
      <path d="M 100 0 H 0 V 100" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    </pattern>

    <g id="candidate-cloud" fill="#93c5fd" stroke="#2563eb" stroke-width="1.3" opacity="0.6">
      <circle cx="-25" cy="-4" r="3"/>
      <circle cx="-19" cy="-22" r="3"/>
      <circle cx="-12" cy="15" r="3"/>
      <circle cx="-5" cy="-12" r="3"/>
      <circle cx="0" cy="24" r="3"/>
      <circle cx="8" cy="-27" r="3"/>
      <circle cx="12" cy="9" r="3"/>
      <circle cx="19" cy="-8" r="3"/>
      <circle cx="25" cy="19" r="3"/>
      <circle cx="29" cy="-23" r="3"/>
      <circle cx="-32" cy="18" r="3"/>
      <circle cx="35" cy="0" r="3"/>
    </g>
  </defs>

  <rect width="960" height="720" fill="#f8fafc"/>

  <!-- Coordinate system: origin is translated to screen point (260, 520). -->
  <g transform="translate(260 520)">
    <rect x="-220" y="-620" width="900" height="820" fill="url(#major-grid)"/>

    <line x1="-210" y1="0" x2="650" y2="0" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="0" y1="170" x2="0" y2="-500" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>

    <text x="660" y="7" font-family="Arial, sans-serif" font-size="22" fill="#111827">x</text>
    <text x="14" y="-474" font-family="Arial, sans-serif" font-size="22" fill="#111827">y</text>
    <text x="-34" y="30" font-family="Arial, sans-serif" font-size="18" fill="#111827">0</text>

    <g font-family="Arial, sans-serif" font-size="14" fill="#64748b">
      <text x="94" y="24">1</text>
      <text x="194" y="24">2</text>
      <text x="294" y="24">3</text>
      <text x="394" y="24">4</text>
      <text x="494" y="24">5</text>
      <text x="-28" y="-96">1</text>
      <text x="-28" y="-196">2</text>
      <text x="-28" y="-296">3</text>
      <text x="-28" y="-396">4</text>
    </g>

    <g stroke="#94a3b8" stroke-width="1.25">
      <line x1="100" y1="-7" x2="100" y2="7"/>
      <line x1="200" y1="-7" x2="200" y2="7"/>
      <line x1="300" y1="-7" x2="300" y2="7"/>
      <line x1="400" y1="-7" x2="400" y2="7"/>
      <line x1="500" y1="-7" x2="500" y2="7"/>
      <line x1="-7" y1="-100" x2="7" y2="-100"/>
      <line x1="-7" y1="-200" x2="7" y2="-200"/>
      <line x1="-7" y1="-300" x2="7" y2="-300"/>
      <line x1="-7" y1="-400" x2="7" y2="-400"/>
    </g>

    <!-- Link endpoints in coordinate units: O(0,0), J1(0.55,1.25), J2(0.85,2.45), J3(1.05,3.35), J4(1.35,4.25). -->
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="0,0 55,-125 85,-245 105,-335 135,-425" stroke="#2563eb" stroke-width="9"/>
      <polyline points="0,0 55,-125 85,-245 105,-335 135,-425" stroke="#dbeafe" stroke-width="3"/>
    </g>

    <!-- Candidate point clouds around every joint. -->
    <use href="#candidate-cloud" x="55" y="-125"/>
    <use href="#candidate-cloud" x="85" y="-245"/>
    <use href="#candidate-cloud" x="105" y="-335"/>
    <use href="#candidate-cloud" x="135" y="-425"/>

    <!-- Selected candidate points from each cloud. -->
    <g fill="#f97316" stroke="#9a3412" stroke-width="2.4">
      <circle cx="88" cy="-143" r="5"/>
      <circle cx="120" cy="-262" r="5"/>
      <circle cx="136" cy="-315" r="5"/>
      <circle cx="168" cy="-405" r="5"/>
    </g>

    <!-- rc distances from joints to selected cloud candidates. -->
    <g fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="8 7" stroke-linecap="round">
      <line x1="55" y1="-125" x2="88" y2="-143"/>
      <line x1="85" y1="-245" x2="120" y2="-262"/>
      <line x1="105" y1="-335" x2="136" y2="-315"/>
      <line x1="135" y1="-425" x2="168" y2="-405"/>
    </g>

    <g font-family="Arial, sans-serif" font-size="17" font-style="italic" fill="#f97316" stroke="#f8fafc" stroke-width="5" paint-order="stroke">
      <text x="95" y="-155">r<tspan baseline-shift="sub" font-size="11">c</tspan></text>
    </g>

    <!-- Target points and distances for the last joints. -->
    <g fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="10 8" stroke-linecap="round">
      <line x1="105" y1="-335" x2="365" y2="-260"/>
      <line x1="135" y1="-425" x2="395" y2="-350"/>
    </g>

    <g stroke="#7c3aed" stroke-width="4" fill="#f5f3ff">
      <circle cx="365" cy="-260" r="11"/>
      <circle cx="395" cy="-350" r="11"/>
    </g>

    <g stroke="#7c3aed" stroke-width="3" stroke-linecap="round">
      <line x1="357" y1="-268" x2="373" y2="-252"/>
      <line x1="373" y1="-268" x2="357" y2="-252"/>
      <line x1="387" y1="-358" x2="403" y2="-342"/>
      <line x1="403" y1="-358" x2="387" y2="-342"/>
    </g>

    <g font-family="Arial, sans-serif" font-size="16" fill="#7c3aed" stroke="#f8fafc" stroke-width="5" paint-order="stroke">
      <text x="377" y="-260">G<tspan baseline-shift="sub" font-size="11">3</tspan></text>
      <text x="407" y="-352">G<tspan baseline-shift="sub" font-size="11">4</tspan></text>
    </g>

    <g font-family="Arial, sans-serif" font-size="18" font-style="italic" fill="#16a34a" stroke="#f8fafc" stroke-width="5" paint-order="stroke">
      <text x="236" y="-285">l<tspan baseline-shift="sub" font-size="12">3</tspan></text>
      <text x="264" y="-398">l<tspan baseline-shift="sub" font-size="12">4</tspan></text>
    </g>

    <g stroke="#111827" stroke-width="4" fill="#ffffff">
      <circle cx="0" cy="0" r="15"/>
      <circle cx="55" cy="-125" r="15"/>
      <circle cx="85" cy="-245" r="15"/>
      <circle cx="105" cy="-335" r="15"/>
      <circle cx="135" cy="-425" r="13"/>
    </g>

    <g font-family="Arial, sans-serif" font-size="16" fill="#111827" stroke="#f8fafc" stroke-width="5" paint-order="stroke">
      <text x="22" y="-136">J<tspan baseline-shift="sub" font-size="11">1</tspan></text>
      <text x="52" y="-256">J<tspan baseline-shift="sub" font-size="11">2</tspan></text>
      <text x="72" y="-346">J<tspan baseline-shift="sub" font-size="11">3</tspan></text>
      <text x="102" y="-436">J<tspan baseline-shift="sub" font-size="11">4</tspan></text>
    </g>

    <g font-family="Arial, sans-serif" font-size="15" fill="#334155" stroke="#f8fafc" stroke-width="4" paint-order="stroke">
      <text x="25" y="-64">link<tspan baseline-shift="sub" font-size="10">1</tspan></text>
      <text x="50" y="-184">link<tspan baseline-shift="sub" font-size="10">2</tspan></text>
      <text x="94" y="-287">link<tspan baseline-shift="sub" font-size="10">3</tspan></text>
      <text x="122" y="-382">link<tspan baseline-shift="sub" font-size="10">4</tspan></text>
    </g>
  </g>
</svg>
